<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Crop</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background-image: url("{{ url_for('static', filename='images/field.jpg') }}");
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
}

.container{
    width:900px;
    margin:40px auto;
    border:4px solid royalblue;
}

.header{
    background:yellow;
    color:orangered;
    text-align:center;
    padding:10px;
    font-size:40px;
    font-weight:bold;
    font-style:italic;
}

.form-area{
    padding:30px;
    text-align:center;
    background:rgba(255,255,255,0.15);
}

.form-area h2{
    color:white;
    margin-bottom:20px;
}

input{
    width:280px;
    padding:10px;
    margin:8px;
    border:none;
    border-radius:4px;
}

button{
    width:280px;
    padding:12px;
    background:#2f00ff;
    color:white;
    border:none;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    background:#0000aa;
}

.result{
    background:black;
    color:white;
    padding:15px;
    font-size:22px;
    font-weight:bold;
    text-align:center;
}
</style>

</head>
<body>

<div class="container">

<div class="header">
Find Your Best Crop Here
</div>

<div class="form-area">

<h2>Please Enter the Conditions</h2>

<form action="/predict" method="POST">

<input type="number" name="nitrogen" placeholder="Nitrogen" required><br>

<input type="number" name="phosphorus" placeholder="Phosphorus" required><br>

<input type="number" name="potassium" placeholder="Potassium" required><br>

<input type="number" step="0.01" name="temperature" placeholder="Temperature" required><br>

<input type="number" step="0.01" name="humidity" placeholder="Humidity" required><br>

<input type="number" step="0.01" name="ph" placeholder="pH" required><br>

<input type="number" step="0.01" name="rainfall" placeholder="Rainfall" required><br><br>

<button type="submit">Predict</button>

</form>

</div>

<div class="result">
{% if prediction %}
Best crop for given conditions is <b>{{ prediction }}</b>
{% else %}
Best crop for given conditions is ...
{% endif %}
</div>

</div>

</body>
</html>
